enum ModelAttributeTypes {
  binary
  binarySet
  bool
  list
  map
  number
  numberSet
  string
  stringSet
  _null
}

input ModelSizeInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
}

enum ModelSortDirection {
  ASC
  DESC
}

type ModelUserConnection {
  items: [User]!
  nextToken: String
}

input ModelUserFilterInput {
  id: ModelIDInput
  email: ModelStringInput
  name: ModelStringInput
  mobile: ModelStringInput
  language: ModelStringInput
  isGuest: ModelBooleanInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelUserFilterInput]
  or: [ModelUserFilterInput]
  not: ModelUserFilterInput
  owner: ModelStringInput
}

type Query {
  getUser(id: ID!): User
  listUsers(filter: ModelUserFilterInput, limit: Int, nextToken: String): ModelUserConnection
  getUserDocument(id: ID!): UserDocument
  listUserDocuments(filter: ModelUserDocumentFilterInput, limit: Int, nextToken: String): ModelUserDocumentConnection
  getCitizenProfile(id: ID!): CitizenProfile
  listCitizenProfiles(filter: ModelCitizenProfileFilterInput, limit: Int, nextToken: String): ModelCitizenProfileConnection
}

input ModelUserConditionInput {
  email: ModelStringInput
  name: ModelStringInput
  mobile: ModelStringInput
  language: ModelStringInput
  isGuest: ModelBooleanInput
  createdAt: ModelStringInput
  and: [ModelUserConditionInput]
  or: [ModelUserConditionInput]
  not: ModelUserConditionInput
  updatedAt: ModelStringInput
  owner: ModelStringInput
}

input CreateUserInput {
  id: ID
  email: String!
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
}

input UpdateUserInput {
  id: ID!
  email: String
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
}

input DeleteUserInput {
  id: ID!
}

type Mutation {
  createUser(input: CreateUserInput!, condition: ModelUserConditionInput): User
  updateUser(input: UpdateUserInput!, condition: ModelUserConditionInput): User
  deleteUser(input: DeleteUserInput!, condition: ModelUserConditionInput): User
  createUserDocument(input: CreateUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
  updateUserDocument(input: UpdateUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
  deleteUserDocument(input: DeleteUserDocumentInput!, condition: ModelUserDocumentConditionInput): UserDocument
  createCitizenProfile(input: CreateCitizenProfileInput!, condition: ModelCitizenProfileConditionInput): CitizenProfile
  updateCitizenProfile(input: UpdateCitizenProfileInput!, condition: ModelCitizenProfileConditionInput): CitizenProfile
  deleteCitizenProfile(input: DeleteCitizenProfileInput!, condition: ModelCitizenProfileConditionInput): CitizenProfile
}

input ModelSubscriptionUserFilterInput {
  id: ModelSubscriptionIDInput
  email: ModelSubscriptionStringInput
  name: ModelSubscriptionStringInput
  mobile: ModelSubscriptionStringInput
  language: ModelSubscriptionStringInput
  isGuest: ModelSubscriptionBooleanInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionUserFilterInput]
  or: [ModelSubscriptionUserFilterInput]
  owner: ModelStringInput
}

type Subscription {
  onCreateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["createUser"])
  onUpdateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["updateUser"])
  onDeleteUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["deleteUser"])
  onCreateUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["createUserDocument"])
  onUpdateUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["updateUserDocument"])
  onDeleteUserDocument(filter: ModelSubscriptionUserDocumentFilterInput, owner: String): UserDocument @aws_subscribe(mutations: ["deleteUserDocument"])
  onCreateCitizenProfile(filter: ModelSubscriptionCitizenProfileFilterInput, owner: String): CitizenProfile @aws_subscribe(mutations: ["createCitizenProfile"])
  onUpdateCitizenProfile(filter: ModelSubscriptionCitizenProfileFilterInput, owner: String): CitizenProfile @aws_subscribe(mutations: ["updateCitizenProfile"])
  onDeleteCitizenProfile(filter: ModelSubscriptionCitizenProfileFilterInput, owner: String): CitizenProfile @aws_subscribe(mutations: ["deleteCitizenProfile"])
}

