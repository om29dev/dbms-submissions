type User {
  id: ID!
  email: String!
  name: String
  mobile: String
  language: String
  isGuest: Boolean
  createdAt: AWSDateTime
  updatedAt: AWSDateTime!
  owner: String
}

type UserDocument {
  id: ID!
  name: String!
  category: String!
  size: String!
  uploadDate: AWSDateTime!
  status: String!
  filePath: String
  isVerified: Boolean!
  verificationMessage: String
  expiryDate: AWSDateTime
  extractedText: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  owner: String
}

type CitizenProfile {
  id: ID!
  full_name: String!
  mobile: String!
  email: String!
  state: String!
  district: String
  pincode: String
  date_of_birth: String
  gender: String
  marital_status: String
  occupation: String
  annual_income_range: String
  caste_category: String
  age: Int
  income: Float
  is_kyc_verified: Boolean
  linked_documents: [String]
  applied_schemes: [String]
  aadhaar_last_four: String
  pan_masked: String
  ration_card_number: String
  is_disabled: Boolean
  disability_type: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  owner: String
}

input ModelStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

